name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo db:generate

      - name: Typecheck
        run: |
          cd apps/web && npx tsc --noEmit
          cd ../realtime && npx tsc --noEmit

      - name: Run Units Tests
        run: cd apps/web && npm run test

      - name: Build Web App
        run: cd apps/web && npm run build
        env:
          NEXT_PUBLIC_REALTIME_URL: "http://localhost:3001"
          REALTIME_INTERNAL_URL: "http://localhost:3001"
          INTERNAL_API_KEY: "wildchat-internal-key"
          # Mock DB URL for build typechecks that need the client generated
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wildchat"
          AUTH_SECRET: "mock-secret-for-ci-build"
