name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx turbo db:generate

      - name: Typecheck web
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Typecheck realtime
        run: npx tsc --noEmit
        working-directory: apps/realtime

      - name: Run Unit Tests
        run: npm run test
        working-directory: apps/web

      - name: Build Web App
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_REALTIME_URL: "http://localhost:3001"
          REALTIME_INTERNAL_URL: "http://localhost:3001"
          INTERNAL_API_KEY: "wildchat-internal-key"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wildchat"
          AUTH_SECRET: "mock-secret-for-ci-build"
